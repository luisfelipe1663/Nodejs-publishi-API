<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consumindo API</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Sistema de Pedidos</h1>

        <!--AREA DE CADASTRO-->
        <h2>Novo Pedido</h2>
        <input type="text" id="cliente" placeholder="Nome do Cliente">
        <input type="text" id="produto" placeholder="Produto">
        <button onclick="">Cadastrar pedido</button>

        <!--AREA DE ATUALIZAÇÃO-->
        <h2>Atualizar status</h2>
        <input type="number" id="idAtualizar" placeholder="ID do Pedido">
        <input type="text" id="statusAtualizar" placeholder="Novo Status">
        <button onclick="">Atualizar</button>
        <!--Area de excluir-->
        <h2>Cancelar pedido</h2>
        <input type="number" id="idRemover" placeholder="ID do Pedido">
        <button onclick=""> Cancelar</button>
        <!-- Lista de Pedido-->
         <h2>Lista de pedidos</h2>
         <ul id="Lista">Carregando pedidos...
         </ul>
    </div>
    <script src="script.js"></script>
</body>

</html>
